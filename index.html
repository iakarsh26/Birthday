<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ffd6e0,#e6f0ff);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.app{
  width:100%;
  max-width:380px;
  height:90vh;
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  display:flex;
  flex-direction:column;
  justify-content:center;
  text-align:center;
  transition:0.5s;
}

h2{margin-bottom:20px;}

button{
  padding:14px;
  border:none;
  border-radius:25px;
  background:#ff6fa5;
  color:white;
  font-size:16px;
  margin-top:20px;
}

.fade{
  animation:fade 0.5s ease;
}
@keyframes fade{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

#gift{
  font-size:70px;
  cursor:pointer;
}

.handwritten{
  background:#fff8e7;
  padding:15px;
  border-radius:12px;
  text-align:left;
  line-height:1.6;
}

.glow{
  color:#ff4d88;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="app" id="app">
  <h2 id="text">Wait… 👀</h2>
  <button onclick="next()">Start</button>
</div>

<script>
let step=0;
let name="Someone";

// flow
function next(){
  step++;

  if(step==1){
    update("Wait… don’t skip this.");
  }

  if(step==2){
    update("I made something for you…");
  }

  if(step==3){
    update("Hey "+name+" 💖");
  }

  if(step==4){
    update("This is not a normal birthday wish.");
  }

  if(step==5){
    update("HAPPY BIRTHDAY 🎂💖");
    confetti();
  }

  if(step==6){
    showGift();
  }

  if(step==7){
    showLines();
  }

  if(step==8){
    showParagraph();
  }
}

function update(msg){
  app.innerHTML=`<h2 class="fade">${msg}</h2>
  <button onclick="next()">Next</button>`;
}

// gift
function showGift(){
  app.innerHTML=`
  <h2>Tap to open 🎁</h2>
  <div id="gift" onclick="openGift()">🎁</div>`;
}

function openGift(){
  app.innerHTML=`
  <h2 class="fade">You make everything better 💖</h2>`;
  confetti();
  setTimeout(next,2000);
}

// fun lines
function showLines(){
  let lines=[
    "We share one brain cell 😂",
    "Still somehow survive life 😭"
  ];
  let i=0;

  function show(){
    if(i<lines.length){
      app.innerHTML=`<h2 class="fade">${lines[i]}</h2>`;
      i++;
      setTimeout(show,2000);
    }else{
      next();
    }
  }
  show();
}

// paragraph
function showParagraph(){
  app.innerHTML=`<div class="handwritten" id="para"></div>`;

  let lines=[
"I don’t say this often…",
"",
"But you actually matter to me.",
"",
"A lot more than you think.",
"",
"You make normal days better…",
"And bad days easier.",
"",
"And no matter what happens…",
"",
"I’m always gonna be here 🫶",
"",
"Happy Birthday 💖"
  ];

  let i=0;
  function show(){
    if(i<lines.length){
      para.innerHTML+=lines[i]+"<br><br>";
      if(lines[i].includes("Happy")){
        para.classList.add("glow");
        confetti();
      }
      i++;
      setTimeout(show,800);
    }else{
      para.innerHTML+=`<br>– Someone`;
      app.innerHTML+=`<button onclick="location.reload()">Replay 🔁</button>`;
    }
  }
  show();
}
</script>

</body>
</html>
