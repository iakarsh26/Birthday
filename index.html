<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ffd6e0,#e6f0ff);
  overflow:hidden;
}

/* card */
.app{
  width:100%;
  max-width:380px;
  height:92vh;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(20px);
  border-radius:24px;
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
  padding:20px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  text-align:center;
  transition:0.5s;
}

/* text */
h2{
  font-size:20px;
  color:#333;
  line-height:1.5;
}

/* button */
.btn{
  padding:14px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#ff6fa5,#ff9ac2);
  color:white;
  font-size:15px;
  cursor:pointer;
  margin-top:20px;
  box-shadow:0 10px 20px rgba(255,105,150,0.4);
}
.btn:active{transform:scale(0.95);}

/* animation */
.fade{
  animation:fadeUp .5s ease;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* gift */
.gift{
  font-size:70px;
  cursor:pointer;
  transition:0.3s;
}
.gift:hover{transform:scale(1.1);}

/* paragraph */
.paper{
  background:#fff8e7;
  padding:16px;
  border-radius:14px;
  text-align:left;
  line-height:1.6;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* glow */
.glow{
  color:#ff4d88;
  font-weight:600;
}
</style>
</head>

<body>

<div class="app" id="app">
  <h2 class="fade">Ready for something special? 👀</h2>
  <button class="btn" onclick="start()">Start</button>
</div>

<script>
let step=0;
let from="", to="";

// PERSONALIZATION
to = prompt("Birthday Person Name 💖") || "Friend";
from = prompt("Your Name 🫶") || "Someone";

function render(text, btn=true){
  app.innerHTML=`
    <h2 class="fade">${text}</h2>
    ${btn?'<button class="btn" onclick="next()">Continue</button>':''}
  `;
}

function start(){
  next();
}

function next(){
  step++;

  if(step==1) render("Okay "+to+"… don’t rush this 😶✨");
  if(step==2) render("Something was made only for you 🫠");
  if(step==3) render("Hey "+to+" 👀💖");
  if(step==4) render("This is not a normal birthday wish 😏🎁");

  if(step==5){
    render("It’s YOUR day today 🎂✨", false);
    confetti({particleCount:120,spread:80});
    setTimeout(next,1500);
  }

  if(step==6){
    app.innerHTML=`
      <h2 class="fade">A small surprise 🎁</h2>
      <div class="gift" onclick="openGift()">🎁</div>
    `;
  }

  if(step==7){
    showFun();
  }

  if(step==8){
    showFinal();
  }
}

function openGift(){
  confetti();
  render("Life feels better when you're around 🫶💖", false);
  setTimeout(next,1800);
}

function showFun(){
  let lines=[
    "We talk nonsense… but it somehow makes sense 😂",
    "Random chats = best part of the day 😭🫂"
  ];

  let i=0;
  function loop(){
    if(i<lines.length){
      render(lines[i],false);
      i++;
      setTimeout(loop,1800);
    }else next();
  }
  loop();
}

function showFinal(){
  app.innerHTML=`<div class="paper" id="para"></div>`;

  let text =
`I don’t usually do things like this… 😅 but you’re not a usual person in my life 💭 Somehow you became important without even realizing it 🫠 It’s the little things — random talks, jokes, deep conversations 😂💬 And honestly I wouldn’t trade that for anything 🫶 You make things lighter even on bad days 🌙 And yeah I don’t say this much but I really appreciate you 🤍 Today isn’t just another day… it’s yours 🎂✨ I hope you feel as special as you actually are 💖 Happy Birthday ${to} 🎂💖 – ${from}`;

  let i=0;
  function type(){
    if(i<text.length){
      para.innerHTML += text.charAt(i);
      i++;
      setTimeout(type,25);
    }else{
      confetti();
      app.innerHTML += `<button class="btn" onclick="location.reload()">Replay 🔁</button>`;
    }
  }
  type();
}
</script>

</body>
</html>
