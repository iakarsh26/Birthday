<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:black;color:white;overflow:hidden;}

.section{
  position:absolute;
  width:100%;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  opacity:0;
  transition:1.2s ease;
  text-align:center;
  padding:20px;
}

.active{opacity:1;}

h1,h2{font-weight:300;}

.stars{
  position:absolute;
  width:100%;
  height:100%;
  background:url('https://i.ibb.co/6J5vXxC/stars.png');
  animation:move 80s linear infinite;
  z-index:-1;
}

@keyframes move{
  from{background-position:0 0;}
  to{background-position:10000px 5000px;}
}

/* Envelope */
.envelope{
  width:220px;
  height:140px;
  background:#ff4d6d;
  position:relative;
  margin-top:20px;
}

.envelope:before{
  content:'';
  position:absolute;
  top:-70px;
  border-left:110px solid transparent;
  border-right:110px solid transparent;
  border-bottom:70px solid #ff4d6d;
}

/* Typing */
#text{width:85%;line-height:1.7;font-size:18px;}

/* Balloons */
.balloon{
  width:60px;height:80px;
  background:#ff4d6d;
  border-radius:50%;
  position:absolute;
  bottom:-100px;
  animation:float linear forwards;
}

@keyframes float{
  to{transform:translateY(-120vh);}
}

/* Final */
.final{
  font-size:32px;
  line-height:1.5;
}
</style>
</head>

<body>

<div class="stars"></div>

<!-- Sections -->
<div class="section active" id="s1">
  <h1>Hey... 😊</h1>
</div>

<div class="section" id="s2">
  <h2>I have something for you 💌</h2>
  <div class="envelope"></div>
</div>

<div class="section" id="s3">
  <div id="text"></div>
</div>

<div class="section" id="s4">
  <h2>Just wait... 🎈</h2>
</div>

<div class="section" id="s5">
  <div class="final">
    🎉 Happy Birthday 🎉 <br><br>
    You are truly special 💖<br>
    Stay happy always 🥹
  </div>
</div>

<script>
let current=1;

/* Auto Scene Flow */
function showNext(){
  document.getElementById("s"+current).classList.remove("active");
  current++;
  document.getElementById("s"+current).classList.add("active");
}

/* Timing like cinematic */
setTimeout(showNext,2000); // s1 -> s2
setTimeout(()=>{showNext(); typing();},5000); // s2 -> s3
setTimeout(showNext,13000); // s3 -> s4
setTimeout(()=>{showNext(); balloons();},17000); // s4 -> s5

/* Typing */
function typing(){
let msg="Sometimes words are not enough...\nBut today is special...\nBecause you exist 💖\nAnd you make everything better 🥹";
let i=0;

function type(){
  if(i<msg.length){
    document.getElementById("text").innerHTML+=msg.charAt(i);
    i++;
    setTimeout(type,40);
  }
}
type();
}

/* Balloons */
function balloons(){
for(let i=0;i<20;i++){
  let b=document.createElement("div");
  b.className="balloon";
  b.style.left=Math.random()*100+"vw";
  b.style.animationDuration=(4+Math.random()*3)+"s";
  document.body.appendChild(b);
}
}
</script>

</body>
</html>
