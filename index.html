<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎂💖</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#ffd6e0,#e6f0ff);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.app{
  width:100%;
  max-width:380px;
  height:90vh;
  background:white;
  border-radius:20px;
  padding:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  text-align:center;
}

img{
  width:100%;
  border-radius:12px;
  max-height:220px;
  object-fit:cover;
}

button{
  padding:14px;
  border:none;
  border-radius:25px;
  background:#ff6fa5;
  color:white;
  font-size:16px;
  width:100%;
}

.progress{
  height:6px;
  background:#eee;
  border-radius:10px;
}
.fill{
  height:100%;
  width:0%;
  background:#ff6fa5;
  border-radius:10px;
  transition:.4s;
}

.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:white;
  padding:20px;
  border-radius:15px;
  width:90%;
  max-width:300px;
}

.msg-card{
  background:#ffe6f0;
  padding:15px;
  border-radius:12px;
  margin:10px 0;
  cursor:pointer;
}

#creatorBtn{
  position:fixed;
  bottom:15px;
  right:15px;
  background:#ff6fa5;
  padding:10px 15px;
  border-radius:25px;
  color:white;
}
</style>
</head>

<body>

<div class="app">
  <div class="progress"><div class="fill" id="bar"></div></div>

  <h2 id="text">Wait… 👀</h2>
  <img id="gif" src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif">

  <button id="btn" onclick="next()">Start 🎉</button>
</div>

<div id="creatorBtn" onclick="openPop()">Create 🎁</div>

<div class="popup" id="pop">
  <div class="popup-box">
    <h3>Enter Name</h3>
    <input id="name" style="width:100%;padding:10px;"><br><br>
    <button onclick="save()">Done</button>
  </div>
</div>

<div class="popup" id="msgPop">
  <div class="popup-box">
    <h3>Special Messages 💌</h3>
    <div id="msgBox"></div>
    <p id="count"></p>
  </div>
</div>

<script>
let step=0;
let name="Someone";

function next(){
  step++;
  bar.style.width=(step*11)+"%";

  if(step==1){
    text.innerText="Hey "+name+" 💖";
  }

  if(step==2){
    text.innerText="This is not a normal birthday wish 👀";
  }

  if(step==3){
    text.innerText="Something special is coming 😏";
  }

  if(step==4){
    text.innerText="Loading surprise...";
    btn.style.display="none";
    let i=0;
    let load=setInterval(()=>{
      bar.style.width=(40+i*5)+"%";
      i++;
      if(i>10){
        clearInterval(load);
        btn.style.display="block";
        text.innerText="Ready? 🎁";
      }
    },100);
  }

  if(step==5){
    text.innerText="HAPPY BIRTHDAY 🎂💖";
    gif.src="https://media.giphy.com/media/blSTtZehjAZ8I/giphy.gif";
    confetti();
  }

  if(step==6){
    text.innerText="We both share one brain cell 😂";
  }

  if(step==7){
    text.innerText="Still can't believe you tolerate me 😭";
  }

  if(step==8){
    btn.innerText="Open Messages 💌";
    btn.onclick=openMessages;
  }

  if(step==9){
    showParagraph();
  }
}

function openPop(){pop.style.display="flex";}
function save(){
  name=document.getElementById("name").value||"Someone";
  pop.style.display="none";
}

const msgs=[
"With Love 💖\nYou bring so much joy!",
"Dream Big ✨\nMay all dreams come true!",
"New Adventures 🚀\nAmazing memories ahead!",
"You're Amazing 🫶\nYou deserve everything!"
];

let i=0;

function openMessages(){
  msgPop.style.display="flex";
  i=0;
  showMsg();
}

function showMsg(){
  if(i<msgs.length){
    msgBox.innerHTML=`<div class="msg-card">${msgs[i]}</div>`;
    count.innerText="Remaining: "+(msgs.length-i);
    msgBox.onclick=()=>{i++;showMsg();}
  }else{
    msgBox.innerHTML="<h3>All Done ✨</h3>";
    count.innerText="";
    confetti();
  }
}

function showParagraph(){
  document.querySelector(".app").innerHTML=`
  <h3>💌</h3>
  <p id="para"></p>
  <button onclick="location.reload()">Restart 🔁</button>
  `;

  let textPara="I don’t even know where to start... but I’m really glad you exist. From stupid jokes to real talks... everything with you feels different. You matter a lot more than you think. Happy Birthday 💖";
  let i=0;

  function type(){
    if(i<textPara.length){
      document.getElementById("para").innerHTML+=textPara[i];
      i++;
      setTimeout(type,30);
    }
  }
  type();
}
</script>

</body>
</html>
