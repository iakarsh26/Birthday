<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Someone Special 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  overflow-x: hidden;
  text-align: center;
  color: #fff;
}

/* Loader */
#loader {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  font-size: 24px;
}

/* Sections */
.section {
  display: none;
  padding: 40px 20px;
  min-height: 100vh;
}

.active {
  display: block;
}

/* Button */
.btn {
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: white;
  color: #ff4d6d;
  font-weight: bold;
  cursor: pointer;
  margin-top: 20px;
}

/* Envelope */
.envelope {
  width: 200px;
  height: 120px;
  background: #ff4d6d;
  margin: auto;
  position: relative;
  cursor: pointer;
}

.envelope:before {
  content: '';
  position: absolute;
  top: -60px;
  left: 0;
  border-left: 100px solid transparent;
  border-right: 100px solid transparent;
  border-bottom: 60px solid #ff4d6d;
}

/* Balloons */
.balloon {
  width: 50px;
  height: 70px;
  background: red;
  border-radius: 50%;
  position: absolute;
  bottom: -100px;
  animation: float 6s infinite;
}

@keyframes float {
  0% { transform: translateY(0); }
  100% { transform: translateY(-100vh); }
}

/* Popup */
.popup {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: white;
  color: black;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}

/* Form */
#formBox {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  color: black;
  padding: 20px;
  border-radius: 15px;
}
input, textarea {
  width: 90%;
  margin: 5px;
}
</style>
</head>

<body>

<div id="loader">Loading surprise... 💖</div>

<!-- Section 1 -->
<div class="section active" id="s1">
  <h1>Wait... 😊</h1>
  <button class="btn" onclick="next()">Tap to Begin</button>
</div>

<!-- Section 2 -->
<div class="section" id="s2">
  <h2>Open this 💌</h2>
  <div class="envelope" onclick="next()"></div>
</div>

<!-- Section 3 -->
<div class="section" id="s3">
  <h2 id="msg"></h2>
  <button class="btn" onclick="next()">Next</button>
</div>

<!-- Section 4 -->
<div class="section" id="s4">
  <h2>Tap balloons 🎈</h2>
</div>

<!-- Section 5 -->
<div class="section" id="s5">
  <h1>🎉 Happy Birthday 🎉</h1>
  <p>You are very special 💖</p>
</div>

<!-- Popup Button -->
<div class="popup" onclick="openForm()">Create Yours 💖</div>

<!-- Form -->
<div id="formBox">
  <h3>Create your version</h3>
  <input type="text" id="name" placeholder="Name"><br>
  <textarea id="customMsg" placeholder="Message"></textarea><br>
  <button onclick="generate()">Generate</button>
</div>

<script>
let current = 1;

window.onload = () => {
  setTimeout(() => {
    document.getElementById("loader").style.display = "none";
  }, 2000);
};

function next() {
  document.getElementById("s" + current).classList.remove("active");
  current++;
  document.getElementById("s" + current).classList.add("active");

  if(current === 3){
    typeMessage();
  }

  if(current === 4){
    createBalloons();
  }
}

function typeMessage(){
  let text = "You mean a lot to me 💖\nThis day is special because of YOU 🥹";
  let i = 0;
  let speed = 50;
  let msg = document.getElementById("msg");

  function typing(){
    if(i < text.length){
      msg.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }
  typing();
}

function createBalloons(){
  for(let i=0;i<10;i++){
    let b = document.createElement("div");
    b.className = "balloon";
    b.style.left = Math.random()*100 + "vw";
    b.onclick = () => b.remove();
    document.body.appendChild(b);
  }
}

function openForm(){
  document.getElementById("formBox").style.display = "block";
}

function generate(){
  let name = document.getElementById("name").value;
  let msg = document.getElementById("customMsg").value;

  if(name){
    alert("Link generated! (Demo)\nShare this idea 💖");
  }
}
</script>

</body>
</html>
