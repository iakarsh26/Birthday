<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
:root{
  --pink:#ff6fa5;
  --pink2:#ff9ac2;
}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#ffd6e0,#e6f0ff);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* card */
.app{
  width:100%;
  max-width:380px;
  height:92vh;
  padding:20px;
  border-radius:24px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.65);
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
  display:flex;
  flex-direction:column;
  justify-content:center;
  text-align:center;
  transition:0.5s;
}

/* text */
h2{
  font-size:20px;
  margin-bottom:20px;
  line-height:1.5;
}

/* button */
.btn{
  padding:14px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,var(--pink),var(--pink2));
  color:white;
  font-size:15px;
  box-shadow:0 10px 20px rgba(255,105,150,0.4);
  cursor:pointer;
}
.btn:active{transform:scale(0.95);}

/* fade */
.fade{
  animation:fadeUp .5s ease;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* gift */
.gift{
  font-size:70px;
  cursor:pointer;
  transition:.3s;
}
.gift:hover{transform:scale(1.1);}

/* paragraph */
.paper{
  background:#fff8e7;
  padding:16px;
  border-radius:14px;
  text-align:left;
  line-height:1.6;
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* glow */
.glow{
  color:var(--pink);
  font-weight:600;
}
</style>
</head>

<body>

<div class="app" id="app">
  <h2 class="fade">Wait… 👀</h2>
  <button class="btn" onclick="next()">Start</button>
</div>

<script>
let step=0;
let name="Someone";

function render(text, btn=true){
  app.innerHTML=`
    <h2 class="fade">${text}</h2>
    ${btn?'<button class="btn" onclick="next()">Continue</button>':''}
  `;
}

function next(){
  step++;

  if(step==1) render("Okay wait… don’t rush this 😶✨");
  if(step==2) render("I didn’t just send a message… I made this for you 🫠");
  if(step==3) render("Hey "+name+" 👀💖");
  if(step==4) render("And no… this isn’t some basic birthday wish 😏🎁");

  if(step==5){
    render("It’s YOUR day today 😌🎂✨");
    confetti({particleCount:120,spread:80});
  }

  if(step==6){
    app.innerHTML=`
      <h2 class="fade">Tap to open 🎁</h2>
      <div class="gift" onclick="openGift()">🎁</div>
    `;
  }

  if(step==7){
    showFun();
  }

  if(step==8){
    showFinal();
  }
}

/* gift */
function openGift(){
  confetti();
  render("Not gonna lie… life feels better with you in it 🫶🥹",false);
  setTimeout(next,1800);
}

/* fun */
function showFun(){
  let lines=[
    "We talk nonsense… but somehow it makes sense 😂🧠",
    "Half of our chats = random, other half = therapy 😭🫂"
  ];

  let i=0;
  function loop(){
    if(i<lines.length){
      render(lines[i],false);
      i++;
      setTimeout(loop,1800);
    }else next();
  }
  loop();
}

/* final paragraph */
function showFinal(){
  app.innerHTML=`<div class="paper" id="para"></div>`;

  let lines=[
"I don’t usually do things like this… 😅",
"But you’re not exactly a usual person in my life 💭",
"",
"Somehow… you became important without me even realizing when it happened 🫠",
"",
"It’s the little things — random talks, stupid jokes, those unexpected deep conversations… 😂💬",
"",
"And honestly, I wouldn’t trade that for anything 🫶",
"",
"You just make things feel lighter… even on bad days 🌙",
"",
"And yeah… I don’t say this much,",
"But I really appreciate you being here 🤍",
"",
"So today isn’t just another day… it’s yours 🎂✨",
"",
"And I hope you feel as special as you actually are 💖🥺",
"",
"Happy Birthday "+name+" 🎂💖",
"– Someone who actually cares 🫶"
  ];

  let i=0;
  function type(){
    if(i<lines.length){
      para.innerHTML+=lines[i]+"<br><br>";
      if(lines[i].includes("Happy")){
        para.classList.add("glow");
        confetti();
      }
      i++;
      setTimeout(type,700);
    }else{
      app.innerHTML+=`<button class="btn" onclick="location.reload()">Replay 🔁</button>`;
    }
  }
  type();
}
</script>

</body>
</html>
